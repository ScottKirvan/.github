name: Reusable — AI Release Notes

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to rewrite notes for
        required: true
        type: string
      project_name:
        description: Human-readable display name (e.g. "QuKi Notes", not "QuKi-Notes")
        required: true
        type: string
      project_context:
        description: One or two sentences describing the project and its audience
        required: true
        type: string
      header:
        description: Optional markdown block prepended before the AI-generated notes
        required: false
        type: string
        default: ""
      footer:
        description: Optional markdown block appended after the AI-generated notes
        required: false
        type: string
        default: ""
      changelog_path:
        description: Repo-relative path to the changelog file (appended as a link in the release notes footer)
        required: false
        type: string
        default: notes/CHANGELOG.md
      model:
        description: GitHub Models model identifier
        required: false
        type: string
        default: openai/gpt-4o

permissions:
  contents: write
  models: read

jobs:
  rewrite-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch current release notes and build prompt
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_name }}
          REPO: ${{ github.repository }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PROJECT_CONTEXT: ${{ inputs.project_context }}
        run: |
          gh release view "$TAG" --repo "$REPO" --json body -q '.body' > /tmp/raw_notes.md
          printf 'Project name: %s\nProject context: %s\n\nRaw changelog:\n' \
            "$PROJECT_NAME" "$PROJECT_CONTEXT" > /tmp/prompt.txt
          cat /tmp/raw_notes.md >> /tmp/prompt.txt

      - name: Rewrite and categorize notes with AI
        id: ai
        uses: actions/ai-inference@v2
        with:
          model: ${{ inputs.model }}
          max-completion-tokens: 1500
          temperature: 0.4
          system-prompt: |
            You are a technical writer helping communicate software releases to end users.
            Rewrite the provided changelog into plain, friendly English.
            Always refer to the project by its exact name as given in "Project name:" — do not infer or substitute a different name.
            Organize the output into two sections using these exact headings (omit a section if there is nothing to put in it):

            ### What's New
            ### Bug Fixes

            Under each heading, write concise bullet points a non-technical user can understand.
            Keep each bullet to one sentence. No marketing language. Do not invent anything not in the input.
            Output only the section headings and bullets — no preamble, no summary, no extra text.
          prompt-file: /tmp/prompt.txt

      - name: Assemble and publish release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_name }}
          REPO: ${{ github.repository }}
          HEADER: ${{ inputs.header }}
          AI_NOTES: ${{ steps.ai.outputs.response }}
          FOOTER: ${{ inputs.footer }}
          CHANGELOG_PATH: ${{ inputs.changelog_path }}
        run: |
          # Append changelog link to footer (strip trailing whitespace first so the link lands inline)
          TRIMMED_FOOTER=$(printf '%s' "$FOOTER" | sed 's/[[:space:]]*$//')
          if [ -n "$CHANGELOG_PATH" ]; then
            CHANGELOG_URL="https://github.com/$REPO/blob/main/$CHANGELOG_PATH"
            if [ -n "$TRIMMED_FOOTER" ]; then
              FULL_FOOTER="${TRIMMED_FOOTER} · 📋 [Changelog](${CHANGELOG_URL})"
            else
              FULL_FOOTER="📋 [Changelog](${CHANGELOG_URL})"
            fi
          else
            FULL_FOOTER="$FOOTER"
          fi

          {
            if [ -n "$HEADER" ]; then printf '%s\n\n' "$HEADER"; fi
            printf '%s\n' "$AI_NOTES"
            if [ -n "$FULL_FOOTER" ]; then printf '\n%s\n' "$FULL_FOOTER"; fi
          } > /tmp/release_notes.md
          gh release edit "$TAG" --repo "$REPO" --notes-file /tmp/release_notes.md
          echo "Release notes updated for $TAG"
