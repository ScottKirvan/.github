name: Reusable — Update Changelog with PR Links

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to add PR links for
        required: true
        type: string
      changelog_path:
        description: Path to changelog file relative to repo root
        required: false
        type: string
        default: notes/CHANGELOG.md

permissions:
  contents: write

jobs:
  update-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Add PR links to changelog
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_name }}
          CHANGELOG_PATH: ${{ inputs.changelog_path }}
          REPO: ${{ github.repository }}
        run: |
          # Find the previous release tag (the entry immediately after TAG in the list)
          PREV_TAG=$(gh release list --repo "$REPO" --limit 50 --json tagName \
            --jq --arg tag "$TAG" \
            '[.[].tagName] | index($tag) as $i | if $i != null and $i < (length - 1) then .[$i + 1] else null end')

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "null" ]; then
            echo "No previous release found — skipping PR link update"
            exit 0
          fi

          echo "Comparing $PREV_TAG → $TAG"

          # Get commit SHAs between the two tags
          SHAS=$(gh api "repos/$REPO/compare/${PREV_TAG}...${TAG}" \
            --jq '[.commits[].sha] | .[]' 2>/dev/null || true)

          if [ -z "$SHAS" ]; then
            echo "No commits found between tags — skipping"
            exit 0
          fi

          # Collect PRs associated with each commit, then deduplicate
          > /tmp/prs_raw.txt
          while IFS= read -r SHA; do
            gh api "repos/$REPO/commits/$SHA/pulls" \
              --jq '.[] | "* [#\(.number)](\(.html_url)) \(.title)"' \
              2>/dev/null >> /tmp/prs_raw.txt || true
          done <<< "$SHAS"

          sort -u /tmp/prs_raw.txt > /tmp/prs.txt

          if [ ! -s /tmp/prs.txt ]; then
            echo "No PRs found for this release — skipping"
            exit 0
          fi

          echo "PRs to add:"
          cat /tmp/prs.txt

          # Patch changelog: find version heading and insert PR section using awk
          VERSION="${TAG#v}"
          HEADING_LINE=$(grep -n "^## \[$VERSION\]" "$CHANGELOG_PATH" | head -1 | cut -d: -f1)

          if [ -z "$HEADING_LINE" ]; then
            echo "Version heading for $VERSION not found in changelog — skipping"
            exit 0
          fi

          # Skip if PR section already exists within 20 lines of the heading
          if awk -v start="$HEADING_LINE" \
            'NR>start && NR<=(start+20) && /^### Pull Requests/{found=1} END{exit !found}' \
            "$CHANGELOG_PATH"; then
            echo "PR section already exists — skipping"
            exit 0
          fi

          # Insert ### Pull Requests section immediately after the version heading line
          awk -v ins="$HEADING_LINE" -v prs="/tmp/prs.txt" '
            FNR == ins {
              print
              print ""
              print "### Pull Requests"
              print ""
              while ((getline line < prs) > 0) { print line }
              print ""
              next
            }
            { print }
          ' "$CHANGELOG_PATH" > /tmp/changelog_patched.tmp

          mv /tmp/changelog_patched.tmp "$CHANGELOG_PATH"
          echo "Changelog updated with PR links"

          # Commit if the file changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CHANGELOG_PATH"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update changelog: add PR references for $TAG"
          git push
